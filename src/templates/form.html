{% extends "base.html" %}

{% block content %}
<h2>Neues Deck hinzufügen</h2>

<div class="grid">
    <form action="/add" method="POST" id="deckForm">
        <label for="commander_name">Commander Name *</label>
        <input type="text" id="commander_name" name="commander_name" placeholder="z.B. Aragorn" required autocomplete="off" list="commander-list">

        <datalist id="commander-list"></datalist>

        <small id="search-status">Tippe den Namen ein, um Vorschläge zu sehen...</small>
        <input type="hidden" id="color_identity" name="color_identity">
        <input type="hidden" id="image_url" name="image_url">

        <div class="grid" style="margin-top: 1rem;">
            <div>
                <label for="archetype">Archetype</label>
                <input type="text" id="archetype" name="archetype" placeholder="z.B. Lifegain, Proliferate">
            </div>
            <div>
                <label for="bracket">Bracket</label>
                <select id="bracket" name="bracket">
                    <option value="1">Bracket 1 (Low)</option>
                    <option value="2" selected>Bracket 2 (Mid)</option>
                    <option value="3">Bracket 3 (High)</option>
                    <option value="4">Bracket 4 (Optimized)</option>
                    <option value="5">Bracket 5 (cEDH)</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div>
                <label for="powerlevel">Powerlevel (1-10)</label>
                <input type="number" id="powerlevel" name="powerlevel" min="1" max="10" value="7">
            </div>
            <div>
                <label for="status">Status *</label>
                <select id="status" name="status" required>
                    <option value="Idea">Idee / Konzept</option>
                    <option value="Digital (Moxfield)">Digital (Moxfield fertig)</option>
                    <option value="In Paper (Proxy)">In Paper (Proxies)</option>
                    <option value="In Paper (Finished)">In Paper (Fertig gebaut)</option>
                </select>
            </div>
        </div>

        <label for="moxfield_link">Moxfield Link</label>
        <input type="url" id="moxfield_link" name="moxfield_link" placeholder="https://www.moxfield.com/decks/...">

        <button type="submit" id="submitBtn" disabled>Deck speichern</button>
    </form>

    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid #374151; padding-left: 2rem;">
        <div id="card-preview" style="text-align: center;">
            <div style="width: 240px; height: 335px; border: 2px dashed #4b5563; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #9ca3af;">
                Kartenvorschau
            </div>
        </div>
    </div>
</div>
{% endblock %}
